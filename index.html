<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pocket Game Store</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script type="module" src="firebase-config.js"></script>
<style>
/* ==========================
   Game Store CSS
========================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0d1117;
    color:#fff;
    min-height:100vh;
}

/* Scrollbar */

::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-thumb{
    background:#3b82f6;
    border-radius:10px;
}

/* Header */

header{
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:18px 8%;

    position:sticky;
    top:0;

    backdrop-filter:blur(18px);

    background:rgba(20,20,20,.65);

    z-index:999;
}

/* Logo */

.logo{
    font-size:30px;
    font-weight:700;

    color:#4da3ff;
}

/* Search */

.searchBox{
    width:40%;
}

.searchBox input{

    width:100%;

    padding:14px 18px;

    border:none;

    border-radius:50px;

    outline:none;

    background:#1f2937;

    color:white;

    font-size:16px;

    transition:.3s;
}

.searchBox input:focus{

    box-shadow:0 0 20px #4da3ff;

}

/* Right */

.userBox{

display:flex;

align-items:center;

gap:15px;

}

#coins{

background:#ffcc00;

color:black;

padding:10px 18px;

border-radius:30px;

font-weight:bold;

}

#loginBtn{

padding:10px 22px;

border:none;

border-radius:30px;

background:#3b82f6;

color:white;

cursor:pointer;

font-weight:bold;

transition:.3s;

}

#loginBtn:hover{

transform:scale(1.08);

}

/* Games */

#gamesContainer{

padding:40px 8%;

display:grid;

grid-template-columns:

repeat(auto-fill,minmax(260px,1fr));

gap:25px;

}

/* Card */

.gameCard{

background:#161b22;

border-radius:20px;

overflow:hidden;

transition:.35s;

cursor:pointer;

box-shadow:

0 8px 20px rgba(0,0,0,.4);

}

.gameCard:hover{

transform:translateY(-10px);

box-shadow:

0 0 25px #4da3ff;

}

/* Image */

.gameCard img{

width:100%;

height:220px;

object-fit:cover;

}

/* Content */

.gameInfo{

padding:18px;

}

.gameInfo h2{

font-size:21px;

margin-bottom:10px;

}

.gameInfo p{

font-size:14px;

opacity:.8;

margin-bottom:12px;

}

.coin{

display:inline-block;

background:#ffcc00;

padding:8px 14px;

border-radius:20px;

color:black;

font-weight:bold;

}

/* Loading */

#loading{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:#0d1117;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

z-index:5000;

}

.loader{

width:70px;

height:70px;

border:8px solid #222;

border-top:8px solid #4da3ff;

border-radius:50%;

animation:spin 1s linear infinite;

}

@keyframes spin{

100%{

transform:rotate(360deg);

}

}

/* Popup */

.popup{

display:none;

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,.8);

justify-content:center;

align-items:center;

z-index:2000;

}

.popupContent{

background:#161b22;

padding:25px;

border-radius:20px;

width:350px;

text-align:center;

}

.popupContent img{

width:100%;

border-radius:15px;

margin-bottom:15px;

}

.popupContent button{

margin-top:15px;

padding:12px 20px;

border:none;

border-radius:10px;

cursor:pointer;

font-size:15px;

font-weight:bold;

}

#downloadBtn{

background:#22c55e;

color:white;

}

#closePopup{

background:#ef4444;

color:white;

margin-left:10px;

}

/* Footer */

footer{

padding:25px;

text-align:center;

opacity:.6;

}

/* Mobile */

@media(max-width:768px){

header{

flex-direction:column;

gap:18px;

}

.searchBox{

width:100%;

}

.logo{

font-size:25px;

}

}

.highlight{
    background:#ffeb3b;
    color:#000;
    padding:2px 4px;
    border-radius:4px;
}

.noResult{
    text-align:center;
    color:#ff5a5a;
    margin-top:40px;
}

.popup{

opacity:0;

pointer-events:none;

transition:.35s;

display:flex;

}

.popup.show{

opacity:1;

pointer-events:auto;

}

.popupContent{

transform:scale(.8);

transition:.35s;

}

.popup.show .popupContent{

transform:scale(1);

}
#username{

    font-weight:bold;

    color:white;

    margin-right:10px;

}

#logoutBtn{

    background:#ef4444;

    color:white;

    border:none;

    padding:10px 20px;

    border-radius:30px;

    cursor:pointer;

    transition:.3s;

}

#logoutBtn:hover{

    transform:scale(1.05);

}
#deviceButtons{

display:flex;

flex-wrap:wrap;

gap:10px;

margin-top:20px;

}

.deviceBtn{

padding:12px 18px;

border:none;

border-radius:12px;

background:#2563eb;

color:white;

cursor:pointer;

font-weight:bold;

transition:.3s;

}

.deviceBtn:hover{

transform:scale(1.05);

}
/* =====================
   Index V2 Design
===================== */

body{
    background:#0f172a;
    color:white;
}


/* Sections */

#featuredSection,
#gamesSection{

    padding:25px;

    max-width:1200px;

    margin:auto;

}


#featuredSection h2,
#gamesSection h2{

    margin-bottom:20px;

}


/* Game Grid */

#featuredGames,
#gamesContainer{

    display:grid;

    grid-template-columns:
    repeat(auto-fill,minmax(260px,1fr));

    gap:20px;

}



/* Game Card */

.gameCard{

    background:#1e293b;

    border-radius:20px;

    overflow:hidden;

    position:relative;

    box-shadow:
    0 10px 25px rgba(0,0,0,.35);

    transition:.3s;

}


.gameCard:hover{

    transform:translateY(-8px);

}


/* Image */

.gameCard img{

    width:100%;

    height:170px;

    object-fit:cover;

}


/* Info */

.gameInfo{

    padding:18px;

}


.gameInfo h3{

    font-size:22px;

    margin-bottom:8px;

}


.gameInfo p{

    color:#cbd5e1;

    font-size:14px;

}



/* Coin */

.coin{

    color:#facc15;

    font-weight:bold;

    margin:10px 0;

}



/* Badge */

.badge{

    position:absolute;

    top:12px;

    left:12px;

    padding:6px 12px;

    border-radius:20px;

    background:#2563eb;

    font-size:12px;

    font-weight:bold;

}


.newBadge{

    background:#22c55e;

}


.popularBadge{

    background:#f97316;

}


/* Device Tags */

.deviceTags{

    display:flex;

    gap:8px;

    flex-wrap:wrap;

}


.deviceTag{

    background:#334155;

    padding:6px 10px;

    border-radius:20px;

    font-size:13px;

}


/* Popup */

.popup{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.7);

    display:none;

    justify-content:center;

    align-items:center;

    z-index:999;

}


.popup.show{

    display:flex;

}


.popupContent{

    background:#1e293b;

    width:90%;

    max-width:450px;

    padding:25px;

    border-radius:20px;

}


.popupContent img{

    width:100%;

    border-radius:15px;

}


/* Device Buttons */

#deviceButtons{

    display:flex;

    gap:10px;

    flex-wrap:wrap;

    margin:20px 0;

}


.deviceBtn{

    border:none;

    padding:12px 18px;

    border-radius:12px;

    background:#2563eb;

    color:white;

    cursor:pointer;

}


.deviceBtn:hover{

    transform:scale(1.05);

}



/* Mobile */

@media(max-width:600px){

#featuredGames,
#gamesContainer{

grid-template-columns:1fr;

}

}
</style>
</head>

<body>

<div id="loading">

<div class="loader"></div>

<p>Loading Games...</p>

</div>

<header>

<div class="logo">

🎮 Pocket Game Store

</div>

<div class="searchBox">

<input
type="text"
id="search"
placeholder="Search Games...">

</div>

<div class="userBox">

    <div id="coins">
        🪙 0
    </div>

    <span id="username">
        Guest
    </span>

    <button id="loginBtn">
        Login
    </button>

    <button id="logoutBtn" style="display:none;">
        Logout
    </button>

</div>
<button id="claimBtn">
🪙 Claim 5 Coins
</button>
<section id="featuredSection">

<h2>🔥 Featured Games</h2>

<div id="featuredGames">

Loading...

</div>

</section>


<section id="gamesSection">

<h2>🎮 All Games</h2>

<div id="gamesContainer">

Loading...

</div>

</section>
<div id="deviceButtons">

</div>
</header>


<div id="gamePopup" class="popup">

    <div class="popupContent">

        <img id="popupImage">

        <h2 id="popupTitle"></h2>

        <p id="popupDescription"></p>

        <h3 id="popupCoin"></h3>

        <h3>Available Devices</h3>

        <div id="deviceButtons">

            <!-- Auto Generate -->

        </div>

        <button id="closePopup">

            Close

        </button>

    </div>

</div>
<footer>

<p>

© 2026 Game Store

</p>

</footer>


<script type="module">
// ===============================
// Game Store Script - Part 4A.1
// ===============================

import { auth, db } from "./firebase-config.js";

import {
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
    ref,
    get,
    child,
    onValue,
    update
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// Elements

const gamesContainer =
document.getElementById("gamesContainer");

const loading =
document.getElementById("loading");

const searchInput =
document.getElementById("search");

const usernameText =
document.getElementById("username");

const loginButton =
document.getElementById("loginBtn");

const logoutButton =
document.getElementById("logoutBtn");

const coinText =
document.getElementById("coins");

const deviceButtons =
document.getElementById("deviceButtons");


// Game List

let games = [];
// ===============================
// Load Games From Firebase
// ===============================

function loadGames(){

    const gamesRef = ref(db,"games");

    onValue(gamesRef,(snapshot)=>{

        games = [];

        gamesContainer.innerHTML="";


        snapshot.forEach((child)=>{

            const game = child.val();

            game.id = child.key;

            games.push(game);

        });


        showGames(games);


        games.forEach(g=>{

            allGames[g.id]=g;

        });


        loading.style.display="none";

    });

}
//Create Card
function createCard(id, game){


    const card = document.createElement("div");


    card.className = "gameCard";


    card.onclick = ()=>{

        openGame(id);

    };


    card.innerHTML = `

        <img src="${game.image}">

        <div class="gameInfo">

            <h3>${game.name}</h3>

            <p>${game.description || ""}</p>

            <div>
                🪙 ${game.coin}
            </div>

        </div>

    `;


    gamesContainer.appendChild(card);

}
//Ads
claimBtn.onclick = async ()=>{

    if(!auth.currentUser){

        alert("Login First");
        return;

    }


    const uid = auth.currentUser.uid;


    const userSnap =
    await get(
        child(ref(db),"users/"+uid)
    );


    const data = userSnap.val();


    const coins =
    data ? (data.coins || 0) : 0;


    await update(
        ref(db,"users/"+uid),
        {
            coins: coins + 5
        }
    );


    alert("🪙 +5 Coins Added");

};
// ===============================
// Show Games
// ===============================

function showGames(gameList, keyword = "") {

    gamesContainer.innerHTML = "";

    if (gameList.length === 0) {

        gamesContainer.innerHTML = `
            <h2 class="noResult">
                ❌ No Games Found
            </h2>
        `;

        return;
    }

    gameList.forEach(game => {

        const card = document.createElement("div");
        card.className = "gameCard";

card.onclick = function(){

    openGame(game.id);

};
        card.className = "gameCard";

        card.innerHTML = `

        <img src="${game.image}" alt="${game.name}">

        <div class="gameInfo">

            <h2>
                ${highlightText(game.name, keyword)}
            </h2>

            <p>
                ${highlightText(
                    game.description || "No Description",
                    keyword
                )}
            </p>

            <span class="coin">
                🪙 ${game.coin}
            </span>

        </div>

        `;

        card.addEventListener("click",()=>{

    window.location.href =
    "game.html?id="+game.id;

});

        gamesContainer.appendChild(card);

    });

}

searchInput.addEventListener("input", () => {

    const keyword = searchInput.value
        .trim()
        .toLowerCase();

    const filtered = games.filter(game => {

        const name =
            (game.name || "").toLowerCase();

        const description =
            (game.description || "").toLowerCase();

        return (
            name.includes(keyword) ||
            description.includes(keyword)
        );

    });

    showGames(filtered, keyword);

});

function highlightText(text, keyword) {

    if (!keyword) return text;

    const regex = new RegExp(`(${keyword})`, "gi");

    return text.replace(
        regex,
        `<mark class="highlight">$1</mark>`
    );

}

// =======================
// Popup Elements
// =======================

const popup = document.getElementById("gamePopup");

const popupImage = document.getElementById("popupImage");

const popupTitle = document.getElementById("popupTitle");

const popupDescription =
document.getElementById("popupDescription");

const popupCoin =
document.getElementById("popupCoin");



const closePopup =
document.getElementById("closePopup");

let selectedGame = null;
let allGames = {};
function openGame(id){

    const game = allGames[id];

    if(!game){
        console.log("Game not found");
        return;
    }


    deviceButtons.innerHTML = "";


    const icons = {

        windows:"💻",
        android:"📱",
        linux:"🐧",
        mac:"🍎",
        ios:"📱"

    };


    Object.keys(game.devices || {}).forEach(device=>{


        const data = game.devices[device];


        if(!data.enabled) return;


        const btn = document.createElement("button");


        btn.className="deviceBtn";


        if(!data.link || data.link.trim()==""){


            btn.innerHTML =
            "⏳ "+icons[device]+" "+device+" Coming Soon";


            btn.disabled = true;


        }else{


            btn.innerHTML =
            "⬇️ "+icons[device]+" "+device;


            btn.onclick = ()=>{

                window.open(data.link,"_blank");

            };

        }


        deviceButtons.appendChild(btn);


    });




    popup.classList.add("show");

}
closePopup.addEventListener("click",()=>{

    popup.style.display="none";
popup.classList.remove("show");

});

popup.addEventListener("click",(e)=>{

    if(e.target===popup){

        popup.style.display="none";

    }

});


//auth
onAuthStateChanged(auth,(user)=>{

    if(user){


        onValue(
            ref(db,"users/"+user.uid),
            (snap)=>{


                const data = snap.val();


                usernameText.textContent =
                data?.username || "User";


                coinText.textContent =
                "🪙 " + (data?.coins || 0);


            }
        );


    }else{


        usernameText.textContent="Guest";

        coinText.textContent="🪙 0";


    }

});

loginButton.addEventListener("click",()=>{

    window.location.href="login.html";

});
logoutButton.addEventListener("click",async()=>{

    await signOut(auth);

    alert("Logged Out");
});


// Start
loadGames();
</script>
</body>

</html>
