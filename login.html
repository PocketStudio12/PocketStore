<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Pocket Game Store</title>

<link rel="stylesheet" href="login.css">



<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ==========================
   Login Page
========================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:linear-gradient(135deg,#0d1117,#161b22,#1f2937);

    color:white;

}

/* Container */

.container{

    width:100%;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;

}

/* Card */

.card{

    width:400px;

    max-width:95%;

    padding:35px;

    border-radius:20px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(15px);

    box-shadow:0 10px 30px rgba(0,0,0,.4);

    animation:fade .4s;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}

.card h1{

text-align:center;

margin-bottom:10px;

color:#4da3ff;

}

.card h2{

text-align:center;

margin-bottom:25px;

font-weight:500;

}

/* Inputs */

.card input{

width:100%;

padding:14px;

margin-bottom:15px;

border:none;

outline:none;

border-radius:12px;

background:#1f2937;

color:white;

font-size:15px;

transition:.3s;

}

.card input:focus{

box-shadow:0 0 15px #4da3ff;

}

/* Button */

.card button{

width:100%;

padding:14px;

border:none;

border-radius:12px;

background:#3b82f6;

color:white;

font-size:16px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

.card button:hover{

transform:translateY(-2px);

box-shadow:0 0 20px #3b82f6;

}

/* Text */

.card p{

margin-top:18px;

text-align:center;

font-size:14px;

color:#ccc;

}

.card span{

color:#4da3ff;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

.card span:hover{

text-decoration:underline;

}

/* Mobile */

@media(max-width:600px){

.card{

padding:25px;

}

.card h1{

font-size:28px;

}

}
</style>
</head>

<body>

<div class="container">

    <!-- Login Form -->

    <div id="loginBox" class="card">

        <h1>Pocket Game Store</h1>

        <h2>Login</h2>

        <input
        type="email"
        id="loginEmail"
        placeholder="Email">

        <input
        type="password"
        id="loginPassword"
        placeholder="Password">

        <button id="loginBtn">

            Login

        </button>

        <p>

            Don't have an account?

            <span id="showRegister">

                Create New Account

            </span>

        </p>

    </div>

    <!-- Register Form -->

    <div id="registerBox" class="card" style="display:none;">

        <h1>Pocket Game Store</h1>

        <h2>Create Account</h2>

        <input
        type="text"
        id="username"
        placeholder="Username">

        <input
        type="email"
        id="registerEmail"
        placeholder="Email">

        <input
        type="password"
        id="registerPassword"
        placeholder="Password">

        <button id="registerBtn">

            Create Account

        </button>

        <p>

            Already have an account?

            <span id="showLogin">

                Login

            </span>

        </p>

    </div>

</div>
<script type="module">
import { auth, db } from "./firebase-config.js";

import {
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
    ref,
    set
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// Login Elements
import {
    updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
const loginBox = document.getElementById("loginBox");
const registerBox = document.getElementById("registerBox");

const showRegister = document.getElementById("showRegister");
const showLogin = document.getElementById("showLogin");

const loginBtn = document.getElementById("loginBtn");
const registerBtn = document.getElementById("registerBtn");

// Toggle Forms
showRegister.addEventListener("click", () => {
    loginBox.style.display = "none";
    registerBox.style.display = "block";
});

showLogin.addEventListener("click", () => {
    registerBox.style.display = "none";
    loginBox.style.display = "block";
});
// ===============================
// Register User
// ===============================

registerBtn.addEventListener("click", async () => {

    const username =
        document.getElementById("username").value.trim();

    const email =
        document.getElementById("registerEmail").value.trim();

    const password =
        document.getElementById("registerPassword").value;

    if(username==="" || email==="" || password===""){

        alert("Please fill all fields.");

        return;

    }

    if(password.length<6){

        alert("Password must be at least 6 characters.");

        return;

    }

    try{

        const userCredential =
        await createUserWithEmailAndPassword(
            auth,
            email,
            password
        );
       await updateProfile(user,{
    displayName:username
});
        const user = userCredential.user;

        await set(
            ref(db,"users/"+user.uid),
            {

                username:username,

                email:email,

                coins:0,

                createdAt:Date.now()

            }
        );

        alert("Account Created Successfully!");

        window.location.href="index.html";

    }

    catch(error){

        alert(error.message);

    }

});
// ===============================
// Login User
// ===============================

loginBtn.addEventListener("click", async () => {

    const email =
        document.getElementById("loginEmail").value.trim();

    const password =
        document.getElementById("loginPassword").value;

    if(email==="" || password===""){

        alert("Please enter Email and Password.");

        return;

    }

    try{

        await signInWithEmailAndPassword(
            auth,
            email,
            password
        );

        alert("Login Successful!");

        window.location.href="index.html";

    }catch(error){

        alert(error.message);

    }

});

// Auto Login
onAuthStateChanged(auth,(user)=>{

    if(user){

        window.location.href="index.html";

    }

});
</script>
</body>

</html>
