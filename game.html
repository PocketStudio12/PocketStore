<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Game</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{

margin:0;
background:#0f172a;
color:white;
font-family:Poppins,sans-serif;

}

.container{

max-width:900px;
margin:auto;
padding:20px;

}

img{

width:100%;
max-height:350px;
object-fit:cover;
border-radius:20px;

}

.device{

background:#1e293b;
padding:12px;
margin-top:10px;
border-radius:12px;

}

#buyBtn{

margin-top:20px;
width:100%;
padding:15px;
background:#2563eb;
color:white;
border:none;
border-radius:12px;
font-size:18px;

}

#coming{

margin-top:20px;
color:orange;
font-size:20px;
font-weight:bold;
text-align:center;

}
.topBar{

display:flex;

align-items:center;

gap:15px;

padding:18px;

background:#111827;

}

#backBtn{

background:#2563eb;

color:white;

border:none;

padding:10px 16px;

border-radius:10px;

cursor:pointer;

}
</style>

</head>

<body>
<header class="topBar">

    <button id="backBtn">
        ← Back
    </button>

    <h2>Game Details</h2>

</header>
<div class="container">

<img id="image">

<h1 id="name"></h1>

<p id="description"></p>
<div class="actions">
    <button id="shareBtn">📤 Share</button>
</div>
<h2>Available For</h2>

<div id="devices"></div>

<div id="buyArea"></div>

</div>

<script type="module" src="game.js"></script>

</body>
</html>
